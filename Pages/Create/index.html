<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAKSHMI ID MAKER</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js" defer></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" defer></script>

    <style>
        /* Password toggle ke liye zaroori CSS */
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-container input {
            width: 100%;
            padding-right: 40px; /* Icon ke liye space */
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #a0a0a0;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header style="width: 100%; background: linear-gradient(180deg, #050505 0%, #111111 100%); color: #ffffff; padding: 45px 20px; text-align: center; border-radius: 0 0 40px 40px; border-bottom: 2px solid rgba(0, 212, 255, 0.3); box-sizing: border-box; position: relative; overflow: hidden; font-family: 'Inter', sans-serif;">
    
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #00d4ff, #0052ff, #00d4ff);"></div>

            <div class="header-text" style="position: relative; z-index: 2;">
                <h1 style="margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; background: linear-gradient(to right, #ffffff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    LAKSHMI <span style="font-weight: 300; color: #00d4ff; -webkit-text-fill-color: #00d4ff;">ID MAKER</span>
                </h1>
                
                <div style="width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #00d4ff, transparent); margin: 15px auto; border-radius: 10px;"></div>
                
                <p style="margin: 0; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #a0a0a0; opacity: 0.8;">
                    Your Trusted Partner For ID Solutions
                </p>
            </div>

            <div style="position: absolute; left: -20px; top: -20px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%); border-radius: 50%;"></div>
        </header>

        <section id="loginPage" class="main-card" aria-labelledby="loginHeading">
            <h2 id="loginHeading"><i class="fas fa-lock me-2"></i> Login</h2>
            <div class="form-group">
                <input type="text" id="loginUser" placeholder="Phone Number" autocomplete="username" />
            </div>
            <div class="form-group password-container">
                <input type="password" id="loginPass" placeholder="Security Key" autocomplete="current-password" />
                <i class="fas fa-eye toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
            </div>
            <button type="button" onclick="verifyLogin()" class="btn">Login</button>
        </section>

        <section id="homePage" class="main-card hidden" aria-labelledby="homeHeading">
            <div class="form-group">
                <label for="schoolName">School Name</label>
                <select id="schoolName" disabled>
                    <option>Auto-filled...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="idType">ID Type</label>
                <select id="idType">
                    <option value="">Select type</option>
                    <option value="student">Student</option>
                    <option value="staff">Staff</option>
                </select>
            </div>
            <button type="button" onclick="navigateToForm()" class="btn">Continue</button>
        </section>

        <section id="idForm" class="main-card hidden" aria-labelledby="formHeading">
            <h2 id="formHeading"><i class="fas fa-clipboard me-2"></i> Fill ID Form</h2>
            <form id="dataForm" onsubmit="handleSubmit(event)">
                <div id="formFields">
                    </div>

                <div class="media-container" style="margin-bottom: 20px;">
                    <video id="video" autoplay playsinline muted class="hidden"></video>
                    <canvas id="canvas" class="hidden"></canvas>
                </div>

                <div class="btn-group">
                    <button id="cameraBtn" type="button" onclick="startCamera()" class="icon-btn camera-btn" title="Start Camera">
                        <i class="fas fa-video"></i>
                        <span>Camera</span>
                    </button>
                    <button id="submitBtn" type="submit" class="icon-btn submit-btn" title="Submit">
                        <i class="fas fa-paper-plane"></i>
                        <span>Submit</span>
                    </button>
                    <button id="homeBtn" type="button" onclick="goHome()" class="icon-btn home-btn" title="Go to Home">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </button>
                </div>
            </form>
        </section>

        <section id="previewPage" class="main-card hidden" aria-labelledby="previewHeading">
            <h2 id="previewHeading"><i class="fas fa-image me-2"></i> Preview</h2>
            <div id="preview" style="margin-bottom: 20px;"></div>

            <div id="progressContainer" class="progress-container">
                <div id="uploadProgress" class="progress-bar"></div>
            </div>

            <div class="btn-group">
                <button onclick="saveIDAsImage()" class="icon-btn save-btn" title="Save as Image">
                    <i class="fas fa-download"></i>
                    <span>Save</span>
                </button>
                <button onclick="editEntry()" class="icon-btn edit-btn" title="Edit Entry">
                    <i class="fas fa-pen"></i>
                    <span>Edit</span>
                </button>
                <button id="newEntryBtn" onclick="newEntry()" class="icon-btn new-btn" title="Create New ID">
                    <i class="fas fa-plus"></i>
                    <span>New ID</span>
                </button>
            </div>
        </section>
    </div>

    <div id="messageModal" class="modal-container" aria-modal="true" role="dialog">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <div class="modal-icon">
                    </div>
                <h3 id="modalTitle"></h3>
                <p id="modalMessage"></p>
            </div>
            <div class="modal-footer">
                <button id="modalOkBtn" class="btn">OK</button>
            </div>
        </div>
    </div>

    <footer>
        <span><a href="https://penportindia.github.io/penport/" target="_blank">Penport India</a> © 2025</span>
    </footer>

    <script>
        function togglePasswordVisibility() {
            const passInput = document.getElementById('loginPass');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
