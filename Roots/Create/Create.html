<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Create</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

:root {
    --primary: #047857;
    --primary-dark: #065f46;
    --primary-soft: #ecfdf5;
    --primary-tint: rgba(4, 120, 87, 0.12);
    --text: #111827;
    --muted: #6b7280;
    --line: rgba(15, 23, 42, 0.1);
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --danger: #ef4444;
    --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    --radius: 14px;
}

html,
body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
}

body {
    min-height: 100vh;
    background: #ffffff;
    color: var(--text);
    padding: 24px;
}

.stage1-container {
    width: 100%;
    max-width: 1720px;
    margin: 0 auto;
}

.app-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
    align-items: start;
}

.card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
}

.page-hero {
    position: sticky;
    top: 24px;
    min-height: 0;
    padding: 16px 18px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    z-index: 20;
}

.brand-lockup {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-icon {
    width: 46px;
    height: 46px;
    border-radius: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--primary);
    color: #ffffff;
    box-shadow: 0 14px 24px rgba(4, 120, 87, 0.18);
}

.brand-copy h1 {
    font-size: 1.35rem;
    line-height: 1;
    font-weight: 900;
    letter-spacing: 0;
}

.brand-copy p {
    margin-top: 5px;
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 700;
}

.hero-status {
    display: flex;
    justify-content: flex-end;
    justify-self: end;
    gap: 10px;
    margin-left: auto;
}

.status-chip {
    min-height: 54px;
    min-width: 150px;
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 0 13px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    color: var(--text);
    background: #ffffff;
    font-weight: 850;
}

.status-chip i {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    background: var(--primary-soft);
}

.workspace {
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 0;
    margin-top: 2px;
}

.selection-card,
#dataCard {
    padding: 24px 20px 20px;
}

#dataCard {
    padding-top: 32px;
}

#dataCard {
    display: none;
}

.section-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
}

.card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0;
    color: var(--text);
    font-size: 1.22rem;
    font-weight: 900;
}

.card-title i {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    background: var(--primary-soft);
}

.subtitle {
    margin-top: 6px;
    margin-bottom: 0;
    color: var(--muted);
    font-size: 0.88rem;
    font-weight: 650;
}

.select-group {
    display: grid;
    grid-template-columns: minmax(320px, 1.4fr) minmax(240px, 0.8fr);
    gap: 14px;
}

.selection-block {
    min-height: 118px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #ffffff;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 14px;
    cursor: default;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
}

.selection-block:hover {
    border-color: rgba(4, 120, 87, 0.35);
    box-shadow: 0 14px 30px rgba(15, 23, 42, 0.07);
}

.selection-block.active {
    border-color: rgba(4, 120, 87, 0.45);
    background: var(--primary-soft);
    box-shadow: 0 0 0 4px var(--primary-tint);
}

.selection-block label {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
    font-size: 0.86rem;
    font-weight: 900;
}

.selection-block label i {
    color: var(--primary);
}

.selection-block select {
    width: 100%;
    height: 48px;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 0 14px;
    outline: none;
    color: var(--text);
    background: #ffffff;
    font-size: 0.95rem;
    font-weight: 800;
}

.select2-container {
    width: 100% !important;
    max-width: 100%;
    box-sizing: border-box;
}

.select2-container--open {
    z-index: 99999;
    max-width: calc(100vw - 28px);
}

.select2-container--default .select2-selection--single {
    height: 50px;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 48px 10px 14px;
    background: #ffffff;
    position: relative;
}

.select2-container--default .select2-selection--single .select2-selection__rendered {
    padding-left: 0;
    padding-right: 34px;
    color: var(--text);
    line-height: 28px;
    font-weight: 800;
}

.select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 48px;
    right: 8px;
}

.select2-container--default .select2-selection--single .select2-selection__clear {
    position: absolute;
    top: 50%;
    right: 34px;
    transform: translateY(-50%);
    height: 28px;
    width: 28px;
    margin: 0;
    border-radius: 8px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
}

.select2-container--default .select2-selection--single .select2-selection__clear:hover {
    background: var(--primary-soft);
    color: var(--primary);
}

.select2-container--default.select2-container--focus .select2-selection--single,
.select2-container--default:hover .select2-selection--single {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-tint);
}

.select2-dropdown {
    border: 1px solid rgba(4, 120, 87, 0.22);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
    z-index: 99999;
    box-sizing: border-box;
    max-width: calc(100vw - 28px);
}

.select2-container--default .select2-search--dropdown {
    padding: 10px;
}

.select2-container--default .select2-search--dropdown .select2-search__field {
    width: 100% !important;
    box-sizing: border-box;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 10px;
    outline: none;
    padding: 0 12px;
    font-weight: 700;
}

.select2-container--default .select2-search--dropdown .select2-search__field:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-tint);
}

.select2-container--default .select2-results__option--highlighted.select2-results__option--selectable {
    background: var(--primary);
}

button {
    min-height: 46px;
    border: 0;
    border-radius: 12px;
    padding: 0 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--primary);
    color: #ffffff;
    font-size: 0.92rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
}

button:hover:not(:disabled) {
    background: var(--primary-dark);
    box-shadow: 0 14px 26px rgba(4, 120, 87, 0.18);
    transform: translateY(-1px);
}

button:disabled {
    background: #e5e7eb;
    color: #9ca3af;
    cursor: not-allowed;
}

#nextStepBtn {
    min-width: 170px;
    margin-left: auto;
}

.btn-secondary {
    background: #ffffff;
    color: var(--text);
    border: 1px solid var(--line);
}

.btn-secondary:hover:not(:disabled) {
    background: var(--surface-soft);
    box-shadow: none;
}

.card-content-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 18px;
    align-items: start;
}

.form-section {
    min-width: 0;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(190px, 1fr));
    gap: 14px;
}

.form-group {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 14px;
    background: #ffffff;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
}

.form-group:focus-within {
    border-color: rgba(4, 120, 87, 0.32);
    box-shadow: inset 0 0 0 1px rgba(4, 120, 87, 0.18), 0 8px 20px rgba(15, 23, 42, 0.04);
    background: #fbfffd;
}

.form-group label {
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    min-height: 45px;
    border: 1px solid transparent;
    border-radius: 10px;
    outline: none;
    padding: 0 13px;
    background: var(--surface-soft);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 780;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
}

.form-group textarea {
    min-height: 96px;
    padding-top: 12px;
    resize: vertical;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    border-color: transparent;
    box-shadow: none;
    background: #ffffff;
}

.form-group input[readonly] {
    background: var(--primary-soft);
    color: var(--primary-dark);
    border-color: transparent;
}

.action-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
}

.progress-bar-container {
    margin-top: 16px;
    padding: 0;
    background: transparent;
}

.progress-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 7px;
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 900;
    letter-spacing: 0.02em;
}

.progress-meta span {
    display: inline-flex;
    align-items: center;
    gap: 7px;
}

.progress-meta i {
    color: var(--primary);
}

.progress-track {
    height: 7px;
    border-radius: 999px;
    overflow: hidden;
    background: #edf2f0;
    border: 1px solid rgba(4, 120, 87, 0.1);
}

#uploadProgressBar {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #047857, #22c55e);
    box-shadow: none;
    transition: width 0.35s ease;
}

.photo-upload-section {
    position: sticky;
    top: 96px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.photo-upload-section .card-title {
    font-size: 1rem;
}

#photo-preview {
    width: 100%;
    aspect-ratio: 4 / 5;
    border-radius: 14px;
    border: 1px dashed rgba(4, 120, 87, 0.38);
    background: var(--primary-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

#photo-preview:hover {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-tint);
    transform: translateY(-1px);
}

#photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo-upload-input {
    display: none;
}

.placeholder-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    padding: 18px;
    color: var(--muted);
    text-align: center;
    font-size: 0.9rem;
    font-weight: 900;
}

.placeholder-text .fa-4x {
    width: 58px;
    height: 58px;
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: var(--primary);
    font-size: 1.8rem;
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
}

.placeholder-text small,
.photo-upload-section small {
    color: var(--muted);
    font-size: 0.76rem;
    font-weight: 700;
}

#currentSchoolName,
#currentEntryType {
    color: var(--primary-dark);
    font-weight: 900;
}

@media (max-width: 1200px) {
    .page-hero {
        position: static;
        min-height: 0;
        flex-direction: row;
        align-items: center;
    }

    .hero-status {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
    }

    .form-grid {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
    }
}

@media (max-width: 900px) {
    body {
        padding: 14px;
    }

    .select-group,
    .card-content-grid {
        grid-template-columns: 1fr;
    }

    .photo-upload-section {
        position: static;
    }

    #photo-preview {
        aspect-ratio: 16 / 9;
    }
}

@media (max-width: 640px) {
    .page-hero {
        align-items: flex-start;
        flex-direction: column;
    }

    .hero-status,
    .form-grid {
        grid-template-columns: 1fr;
        width: 100%;
    }

    .section-head {
        flex-direction: column;
    }

    #nextStepBtn,
    .action-buttons button {
        width: 100%;
    }
}
</style>
</head>

<body>
<div class="stage1-container" id="stage1Wrapper">
    <div class="app-container">
        <header class="card page-hero">
            <div class="brand-lockup">
                <div class="brand-icon"><i class="fas fa-plus"></i></div>
                <div class="brand-copy">
                    <h1>Create</h1>
                </div>
            </div>
            <div class="hero-status">
                <div class="status-chip"><i class="fas fa-address-card"></i> ID CARD</div>
            </div>
        </header>

        <main class="workspace">
            <div class="card selection-card" id="selectionCard">
                <div class="section-head">
                    <div>
                        <h3 class="card-title"><i class="fas fa-sliders"></i> Setup</h3>
                        <p class="subtitle">Choose school and record category.</p>
                    </div>
                    <button id="nextStepBtn" disabled>
                        <i class="fas fa-arrow-right"></i> Continue
                    </button>
                </div>

                <div class="select-group">
                    <div class="selection-block" id="schoolSelectBlock">
                        <label for="schoolSelect"><i class="fas fa-school"></i> School</label>
                        <select id="schoolSelect" required>
                            <option value="">Loading Schools</option>
                        </select>
                    </div>

                    <div class="selection-block" id="entryTypeBlock">
                        <label for="entryType"><i class="fas fa-user-tag"></i> Type</label>
                        <select id="entryType" required>
                            <option value="">Select Type</option>
                            <option value="student">Student</option>
                            <option value="staff">Staff</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card" id="dataCard">
                <div class="card-content-grid">
                    <div class="form-section">
                        <div class="section-head">
                            <div>
                                <h3 class="card-title"><i class="fas fa-pen"></i> Details</h3>
                                <p class="subtitle">
                                    <span id="currentSchoolName">...</span> - <span id="currentEntryType">...</span>
                                </p>
                            </div>
                        </div>

                        <div class="form-grid" id="formFields"></div>

                        <div class="action-buttons">
                            <button id="backToSelectionBtn" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</button>
                            <button id="submitSingle"><i class="fas fa-save"></i> Save</button>
                        </div>

                        <div class="progress-bar-container">
                            <div class="progress-meta">
                                <span><i class="fas fa-cloud-arrow-up"></i> Upload</span>
                                <span id="uploadProgressText">Ready</span>
                            </div>
                            <div class="progress-track">
                                <div id="uploadProgressBar"></div>
                            </div>
                        </div>
                    </div>

                    <div class="photo-upload-section">
                        <h3 class="card-title"><i class="fas fa-image"></i> Photo</h3>
                        <label for="photoFile" id="photo-preview">
                            <span class="placeholder-text">
                                <i class="fas fa-cloud-arrow-up fa-4x"></i>
                                Upload Image
                                <small>JPEG/PNG, 30KB recommended</small>
                            </span>
                        </label>
                        <input type="file" id="photoFile" class="photo-upload-input" accept="image/*">
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script type="module" src="Script.js"></script>
</body>
</html>
