<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Management | School ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js"></script>

    <style>

        :root {
            --primary-color: #047857;
            --primary-soft: #ecfdf5;
            --delete-color: #ef4444;
            --success-color: #16a34a;
            --background-color: #ffffff;
            --card-background: #ffffff;
            --text-color: #1f2937;
            --sub-text-color: #6b7280;
            --border-color: rgba(15, 23, 42, 0.1);
            --shadow-subtle: 0 12px 32px rgba(15, 23, 42, 0.06);
            --shadow-lift: 0 20px 48px rgba(15, 23, 42, 0.12);
            --border-radius: 14px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--background-color);
            margin: 0;
            padding: 2rem 1.25rem 3rem;
            color: var(--text-color);
            line-height: 1.6;
        }

        .app-shell {
            max-width: 1680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .top-bar-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.35rem;
            background: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-subtle);
            position: sticky;
            top: 1rem;
            z-index: 10;
        }

        .brand-block h1 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 0;
        }

        .brand-block p {
            margin: 0;
            color: var(--sub-text-color);
            font-size: 0.88rem;
            font-weight: 500;
        }

        .search-container {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 14px;
            background: var(--card-background);
            height: 46px;
            min-width: 340px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .search-container:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(4, 120, 87, 0.12);
        }

        .search-container .material-icons {
            color: var(--sub-text-color);
            margin-right: 8px;
            font-size: 20px;
        }

        #searchInput {
            width: 100%;
            padding: 0;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .notification .material-icons {
            font-size: 20px;
            margin-right: 8px;
        }

        .notification-success {
            background: var(--success-color);
            color: white;
        }

        .notification-error {
            background: var(--delete-color);
            color: white;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.1rem;
        }

        .school-summary-card {
            background: var(--card-background);
            border-radius: var(--border-radius);
            padding: 1.25rem;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            text-align: left;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .school-summary-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lift);
            border-color: var(--primary-color);
        }

        .school-summary-card .material-icons {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--primary-soft);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.65rem;
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        .school-summary-card h4 {
            margin: 0;
            font-size: 1.06rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.4;
            overflow-wrap: anywhere;
            margin-top: 5px;
        }

        .school-summary-card .school-id-display {
            font-size: 0.8rem;
            color: var(--sub-text-color);
            margin: 12px 0 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
        }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.42);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            animation: fadeIn 0.3s;
            padding: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--card-background);
            border-radius: var(--border-radius);
            width: 95%;
            max-width: 680px;
            padding: 0;
            border: 1px solid var(--border-color);
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.2);
            transform: scale(0.95);
            animation: slideIn 0.3s forwards;
            overflow: hidden;
        }

        @keyframes slideIn {
            0% {
                transform: scale(0.95) translateY(20px);
            }

            100% {
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.1rem 1.25rem;
            margin-bottom: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            margin: 0;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1.35rem;
            overflow-wrap: anywhere;
        }

        .modal-close-btn {
            width: 40px;
            height: 40px;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--sub-text-color);
            cursor: pointer;
            transition: all 0.18s ease;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close-btn:hover {
            background: #fff1f2;
            color: var(--delete-color);
            border-color: rgba(239, 68, 68, 0.22);
        }

        .data-cards-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.85rem;
            padding: 1rem 1.25rem 1.25rem;
        }

        .data-control-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.35rem 1.2rem 1.2rem;
            box-shadow: none;
            text-align: left;
        }

        .record-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .data-control-card h4 {
            font-size: 1.1rem;
            color: var(--text-color);
            margin: 0;
            font-weight: 700;
        }

        .record-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: var(--primary-soft);
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .data-control-card .count-display {
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 18px 0;
            display: block;
            line-height: 1;
            text-align: center;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 0;
        }

        .data-control-card button {
            min-height: 44px;
            padding: 0 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            white-space: nowrap;
        }

        .data-control-card button .material-icons {
            font-size: 19px;
            margin-right: 7px;
        }

        .data-control-card button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .export-btn {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 8px 18px rgba(4, 120, 87, 0.18);
        }

        .export-btn:hover {
            background: #065f46;
            transform: translateY(-2px);
            border-color: #065f46;
            box-shadow: 0 12px 24px rgba(4, 120, 87, 0.22);
        }

        .export-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(4, 120, 87, 0.28);
        }

        .delete-btn {
            background: #ffffff;
            color: var(--delete-color);
            border: 1px solid rgba(239, 68, 68, 0.32);
            box-shadow: none;
        }

        .delete-btn:hover {
            background: #fef2f2;
            color: var(--delete-color);
            border-color: rgba(239, 68, 68, 0.55);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(239, 68, 68, 0.18);
        }

        .delete-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(255, 82, 82, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 50px 30px;
            font-size: 1.1rem;
            color: var(--sub-text-color);
            background: var(--card-background);
            border-radius: var(--border-radius);
            border: 1px dashed rgba(15, 23, 42, 0.2);
            margin-top: 0;
            grid-column: 1 / -1;
        }

        .empty-state .material-icons {
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: #B0BEC5;
            display: block;
        }

        .modal-description {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-size: 0.86rem;
            margin: 0;
            padding: 0.9rem 1.25rem;
            color: var(--sub-text-color);
            text-align: left;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .modal-description .material-icons {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: var(--primary-soft);
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .loading-state {
            text-align: center;
            padding: 2rem 1.25rem;
        }

        @media (max-width: 760px) {
            body {
                padding: 1rem;
            }

            .top-bar-section {
                position: static;
                flex-direction: column;
                align-items: stretch;
            }

            .search-container {
                min-width: 100%;
            }

            .card-container {
                grid-template-columns: 1fr;
            }

            .data-cards-grid {
                grid-template-columns: 1fr;
            }

            .btn-group {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="notification" class="notification"></div>

    <div class="app-shell">
        <div class="top-bar-section">
            <div class="brand-block">
                <h1>Data Management</h1>
            </div>

            <div class="search-container">
                <span class="material-icons">search</span>
                <input type="text" id="searchInput" placeholder="Search School..." />
            </div>
        </div>

        <div id="cardContainer" class="card-container">
        </div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop">
        <div id="modalContent" class="modal-content">
        </div>
    </div>

    <script type="module">

        import { firebaseConfig } from "../Database/Database.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getDatabase, ref, get, remove, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const cardContainer = document.getElementById("cardContainer");
        const modalBackdrop = document.getElementById("modalBackdrop");
        const modalContent = document.getElementById("modalContent");
        const notification = document.getElementById("notification");
        const searchInput = document.getElementById("searchInput");

        let schoolsDataCache = {};
        let activeSchoolData = null;

        function escapeHtml(unsafe) {
            if (unsafe === null || unsafe === undefined) return '';
            return String(unsafe)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function sanitizeFilename(name) {
            return String(name).replace(/[\\\/:*?"<>|]+/g, '_');
        }

        function showToast(msg, type = 'success') {
            if (!notification) { console.warn('Notification element not found:', msg); return; }
            const icon = type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info';
            notification.innerHTML = `<span class="material-icons">${icon}</span>${msg}`;
            notification.className = 'notification';
            notification.classList.add('show');
            notification.classList.add(type === 'error' ? 'notification-error' : 'notification-success');
            if (notification._hideTimer) clearTimeout(notification._hideTimer);
            notification._hideTimer = setTimeout(() => {
                notification.classList.remove('show', 'notification-success', 'notification-error');
            }, 3000);
        }

        function closeModal() {
            modalBackdrop.style.display = 'none';
            modalContent.innerHTML = '';
            activeSchoolData = null;
        }
        window.closeModal = closeModal;

        async function fetchSchoolSummary() {
            try {
                const snapshot = await get(ref(db, 'DATA-MASTER'));
                schoolsDataCache = {};

                if (snapshot.exists()) {
                    const masterData = snapshot.val();
                    for (const schoolName in masterData) {
                        const schoolNode = masterData[schoolName];
                        const ids = Object.keys(schoolNode || {});

                        if (ids.length > 0) {
                            const firstSchoolID = ids[0];
                            schoolsDataCache[schoolName] = {
                                ids,
                                firstSchoolID: firstSchoolID
                            };
                        }
                    }
                    renderSchoolCards();
                } else {
                    cardContainer.innerHTML = '<div class="empty-state"><span class="material-icons">school</span>No schools found in the database.</div>';
                    showToast("No schools found in database", 'error');
                }
            } catch (err) {
                console.error("Firebase fetch error:", err);
                showToast('Failed to load schools list', 'error');
            }
        }

        function renderSchoolCards() {
            if (!cardContainer) return;
            const filter = (searchInput?.value || '').toLowerCase();
            cardContainer.innerHTML = '';
            let count = 0;

            for (const schoolName in schoolsDataCache) {
                const data = schoolsDataCache[schoolName];
                if (filter && !schoolName.toLowerCase().includes(filter) && !data.firstSchoolID.toLowerCase().includes(filter)) continue;

                const card = document.createElement('div');
                card.className = 'school-summary-card';

                const schoolIDText = data.firstSchoolID
                    ? `ID: ${escapeHtml(data.firstSchoolID)}`
                    : `${data.ids.length} ID(s)`;

                card.innerHTML = `
                <span class="material-icons">school</span>
                <h4>${escapeHtml(schoolName)}</h4>
                <p class="school-id-display" title="First School ID: ${escapeHtml(data.firstSchoolID)}">${schoolIDText}</p>
                `;

                card.addEventListener('click', () => loadSchoolDetails(schoolName));

                cardContainer.appendChild(card);
                count++;
            }

            if (count === 0) {
                cardContainer.innerHTML = `<div class="empty-state"><span class="material-icons">search_off</span>No schools match "${escapeHtml(filter)}".</div>`;
            }
        }

        async function loadSchoolDetails(schoolName) {

            modalContent.innerHTML = `
                <div class="modal-header">
                    <h2>${escapeHtml(schoolName)}</h2>
                    <button class="modal-close-btn" onclick="closeModal()"><span class="material-icons">close</span></button>
                </div>
                <div class="loading-state">
                    <span class="material-icons" style="font-size: 3rem; color: var(--primary-color);">sync</span>
                    <p style="color: var(--sub-text-color);">Loading records...</p>
                </div>
            `;
            modalBackdrop.style.display = 'flex';

            try {
                const snapshot = await get(ref(db, `DATA-MASTER/${schoolName}`));

                if (!snapshot.exists()) {
                    renderDetailCards(schoolName, 0, 0);
                    activeSchoolData = {};
                    showToast('No detailed records found.', 'error');
                    return;
                }

                activeSchoolData = snapshot.val();
                let studentCount = 0;
                let staffCount = 0;

                for (const schoolID in activeSchoolData) {
                    const students = activeSchoolData[schoolID]?.STUDENT || {};
                    const staffs = activeSchoolData[schoolID]?.STAFF || {};
                    studentCount += Object.keys(students).length;
                    staffCount += Object.keys(staffs).length;
                }

                renderDetailCards(schoolName, studentCount, staffCount);

            } catch (err) {
                console.error("Detail load error:", err);
                modalContent.innerHTML = `
                    <div class="modal-header">
                        <h2>${escapeHtml(schoolName)}</h2>
                        <button class="modal-close-btn" onclick="closeModal()"><span class="material-icons">close</span></button>
                    </div>
                    <p class="empty-state"><span class="material-icons">cloud_off</span>Failed to load data details.</p>
                `;
                showToast('Failed to load detailed data', 'error');
            }
        }

        function renderDetailCards(schoolName, studentCount, staffCount) {
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h2>${escapeHtml(schoolName)}</h2>
                    <button class="modal-close-btn" onclick="closeModal()"><span class="material-icons">close</span></button>
                </div>

                <div class="data-cards-grid">
                    ${createDataCard(schoolName, 'Student', studentCount, 'person')}
                    ${createDataCard(schoolName, 'Staff', staffCount, 'group')}
                </div>
            `;

            modalContent.querySelectorAll('.export-btn').forEach(btn => {
                btn.addEventListener('click', (e) => handleExport(e.currentTarget.dataset.school, e.currentTarget.dataset.type));
            });
            modalContent.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => handleDelete(e.currentTarget.dataset.school, e.currentTarget.dataset.type));
            });
        }

        function createDataCard(schoolName, type, count, icon) {
            return `
                <div class="data-control-card">
                    <div class="record-card-header">
                        <span class="material-icons record-icon">${icon}</span>
                        <h4>${type}</h4>
                    </div>
                    <span class="count-display">${count}</span>
                    <div class="btn-group">
                        <button class="export-btn" data-school="${escapeHtml(schoolName)}" data-type="${type}" ${count === 0 ? 'disabled title="No data to export"' : ''}>
                            <span class="material-icons">download</span>Export
                        </button>
                        <button class="delete-btn" data-school="${escapeHtml(schoolName)}" data-type="${type}" ${count === 0 ? 'disabled title="No data to delete"' : ''}>
                            <span class="material-icons">delete_forever</span>Delete
                        </button>
                    </div>
                </div>
            `;
        }

        function getExtensionFromMime(mimeType) {
            if (!mimeType) return 'bin';
            const parts = mimeType.toLowerCase().split('/');
            if (parts[0] !== 'image') return 'bin';

            const subtype = parts[1];
            if (subtype.includes('jpeg')) return 'jpg';
            if (subtype.includes('png')) return 'png';
            if (subtype.includes('gif')) return 'gif';
            if (subtype.includes('webp')) return 'webp';
            return 'jpg';
        }

        async function handleExport(schoolName, type) {
            if (!activeSchoolData) return;
            showToast(`Exporting ${type} data...`, 'success');

            try {
                const zip = new JSZip();
                const photoFolder = zip.folder("Photos");
                const dataToExport = [];
                let totalExported = 0;
                const typeKey = type.toUpperCase();

                for (const schoolID in activeSchoolData) {
                    const records = activeSchoolData[schoolID]?.[typeKey] || {};
                    for (const key in records) {
                        const record = records[key];
                        if (!record) continue;

                        const enrollKey = record.student_enroll || record.staff_enroll || key;
                        const recordPhotoURL = record.photo;

                        const recordForExcel = { ...record };

                        delete recordForExcel.photo;
                        delete recordForExcel.schoolID;
                        delete recordForExcel.schoolId;
                        delete recordForExcel.schoolName;
                        delete recordForExcel['School ID'];
                        delete recordForExcel['School Name'];

                        let finalPhotoFilename = 'N/A';

                        if (recordPhotoURL) {
                            try {
                                const resp = await fetch(recordPhotoURL);
                                if (resp.ok) {
                                    const blob = await resp.blob();

                                    const extension = getExtensionFromMime(blob.type);

                                    finalPhotoFilename = `${sanitizeFilename(enrollKey)}.${extension}`;

                                    photoFolder.file(finalPhotoFilename, blob);
                                }
                            } catch (err) {

                                console.warn(`Failed to fetch photo for ${key}:`, err);
                            }
                        }

                        if (finalPhotoFilename !== 'N/A') {
                            recordForExcel['Photo Filename'] = finalPhotoFilename;
                        } else {
                            recordForExcel['Photo Filename'] = 'N/A (Download Failed)';
                        }

                        dataToExport.push(recordForExcel);
                        totalExported++;
                    }
                }

                if (totalExported > 0) {
                    const ws = XLSX.utils.json_to_sheet(dataToExport);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, type);

                    zip.file(`${sanitizeFilename(schoolName)}-${type}.xlsx`, XLSX.write(wb, { bookType: 'xlsx', type: 'array' }));

                    const blob = await zip.generateAsync({ type: 'blob' });
                    saveAs(blob, `${sanitizeFilename(schoolName)}-${type}-Export.zip`);

                    showToast(`${type} Export successful (${totalExported} records).`, 'success');
                } else {
                    showToast(`No ${type} data found to export.`, 'error');
                }

            } catch (err) {
                console.error('Export failed:', err);
                showToast('Export failed: Check console for details.', 'error');
            }
        }

        async function handleDelete(schoolName, type) {
            if (!activeSchoolData) return;

            if (!confirm(`WARNING: Are you sure you want to DELETE ALL ${type} data for ${schoolName}? This action is PERMANENT and moves data to 'Delete-Desire'.`)) return;

            showToast(`Deleting ${type} data...`, 'error');

            try {
                const promises = [];
                const typeKey = type.toUpperCase();
                let totalDeletedCount = 0;

                for (const schoolID in activeSchoolData) {
                    const records = activeSchoolData[schoolID]?.[typeKey] || {};

                    for (const key of Object.keys(records)) {
                        const record = { ...records[key] };
                        delete record.photo;

                        const deletePath = ref(db, `Delete-Desire/${schoolName}/${schoolID}/${typeKey}/${key}`);
                        const workRef = ref(db, `workdone/${schoolName}/${typeKey}/${key}`);
                        const dataRef = ref(db, `DATA-MASTER/${schoolName}/${schoolID}/${typeKey}/${key}`);
                        const ts = new Date().toISOString();

                        promises.push(
                            set(deletePath, record)
                                .then(() => set(workRef, { deletedAt: ts, type: typeKey, key, schoolID }))
                                .then(() => remove(dataRef))
                                .catch(err => console.warn(`Error deleting record ${key}:`, err))
                        );

                        totalDeletedCount++;
                    }

                    if (activeSchoolData[schoolID]) activeSchoolData[schoolID][typeKey] = {};
                }

                await Promise.all(promises);

                showToast(`${type} Data Deleted successfully (${totalDeletedCount} records).`, 'success');

                setTimeout(() => loadSchoolDetails(schoolName), 800);

            } catch (err) {
                console.error('Delete flow failed:', err);
                showToast('Delete failed: Check console for details.', 'error');
            }
        }

        if (searchInput) searchInput.addEventListener('input', renderSchoolCards);
        fetchSchoolSummary();
    </script>
